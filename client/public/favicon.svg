<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Orange rounded square background -->
  <rect width="32" height="32" rx="8" fill="#f97316"/>
  <!-- Globe circle -->
  <circle cx="16" cy="16" r="8" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Horizontal equator line -->
  <line x1="8" y1="16" x2="24" y2="16" stroke="white" stroke-width="1.5"/>
  <!-- Vertical meridian line -->
  <ellipse cx="16" cy="16" rx="3.5" ry="8" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Top arc latitude -->
  <path d="M9.5 11.5 Q16 13 22.5 11.5" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Bottom arc latitude -->
  <path d="M9.5 20.5 Q16 19 22.5 20.5" stroke="white" stroke-width="1.5" fill="none"/>
</svg>
